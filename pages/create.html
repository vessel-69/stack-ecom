<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="website icon" type="png" href="../logos/Atom.png" />
    <link rel="stylesheet" href="../design/pages.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>STACK - Account Created</title>

    <style>
      .success-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
      }

      .success-box {
        text-align: center;
        max-width: 440px;
      }

      .success-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(0, 200, 255, 0.1);
        border: 2px solid rgba(0, 200, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 24px;
      }

      .success-box h1 {
        font-family: "Rajdhani", sans-serif;
        font-size: 34px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 12px;
      }

      .success-box p {
        font-size: 14px;
        color: #777;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .success-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        padding: 12px 28px;
        background: #00c8ff;
        border: none;
        border-radius: 8px;
        color: #000;
        font-family: "Montserrat", sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: opacity 0.2s;
      }

      .btn-primary:hover {
        opacity: 0.85;
      }

      .btn-secondary {
        padding: 12px 28px;
        background: transparent;
        border: 1.5px solid #1e1e1e;
        border-radius: 8px;
        color: #777;
        font-family: "Montserrat", sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .btn-secondary:hover {
        border-color: #00c8ff;
        color: #00c8ff;
      }

      .redirect-note {
        font-size: 12px;
        color: #444;
        margin-top: 20px;
      }

      #countdown {
        color: #00c8ff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header class="main-header">
      <div class="logo-wrap">
        <a href="../tit.html">
          <img src="../logos/Atom.png" alt="Stack Logo" width="38" />
          <span class="site-name">STACK</span>
        </a>
      </div>
      <div class="header-right">
        <a href="../tit.html" class="login-btn" id="loginNavBtn"
          >Browse Store</a
        >
      </div>
    </header>

    <div class="success-wrapper">
      <div class="success-box">
        <div class="success-icon">&#10003;</div>

        <h1>Account Created</h1>
        <p>
          You're all set, your STACK account is ready to go - check out the
          store and build your setup
        </p>

        <div class="success-actions">
          <a href="login,signup.html" class="btn-primary">Sign In</a>
          <a href="../tit.html" class="btn-secondary">Browse Store</a>
        </div>

        <p class="redirect-note">
          Redirecting to login in <span id="countdown">5</span>s
        </p>
      </div>
    </div>

    <script>
      var seconds = 5;
      var countEl = document.getElementById("countdown");

      var timer = setInterval(function () {
        seconds = seconds - 1;
        countEl.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = "login,signup.html";
        }
      }, 1000);
    </script>
    <script src="../script/shared.js"></script>
  </body>
</html>
